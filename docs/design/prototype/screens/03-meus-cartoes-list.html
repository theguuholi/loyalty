<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meus cartões — Lista</title>
  <link rel="stylesheet" href="../css/prototype.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-inner">
      <a href="02-meus-cartoes-entry.html" class="proto-back">← Trocar e-mail</a>
      <div class="proto-header">
        <h1>Meus cartões</h1>
        <p style="font-size: 0.9rem;">seu@email.com</p>
      </div>

      <div class="card">
        <div class="card-establishment">Barbearia do João</div>
        <div class="progress-wrap"><div class="progress-fill" style="width: 70%;"></div></div>
        <div class="card-progress">7 de 10 carimbos</div>
        <div class="card-reward">Recompensa: 1 corte grátis</div>
      </div>

      <div class="card">
        <div class="card-establishment">Carrinho do Shopping</div>
        <div class="progress-wrap"><div class="progress-fill" style="width: 30%;"></div></div>
        <div class="card-progress">3 de 10 carimbos</div>
        <div class="card-reward">Recompensa: 10 min grátis</div>
      </div>

      <div class="card">
        <div class="card-establishment">Café Central</div>
        <div class="progress-wrap"><div class="progress-fill" style="width: 100%;"></div></div>
        <div class="card-progress">5 de 5 carimbos ✓</div>
        <div class="card-reward">Recompensa: 1 café grátis — pronto para usar!</div>
      </div>
    </div>
  </div>
</body>
</html>
