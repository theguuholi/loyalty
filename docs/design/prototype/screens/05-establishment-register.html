<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estabelecimento — Cadastro</title>
  <link rel="stylesheet" href="../css/prototype.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-inner">
      <a href="04-establishment-login.html" class="proto-back">← Voltar</a>
      <div class="proto-header">
        <h1>Criar conta</h1>
        <p>R$ 10/mês. Após cadastro, você será redirecionado ao pagamento.</p>
      </div>
      <label class="label" for="name">Nome do estabelecimento</label>
      <input type="text" id="name" class="input" placeholder="Barbearia do João">
      <label class="label" for="email">E-mail</label>
      <input type="email" id="email" class="input" placeholder="contato@barbearia.com">
      <label class="label" for="password">Senha</label>
      <input type="password" id="password" class="input" placeholder="••••••••">
      <a href="06-establishment-dashboard.html" class="btn btn-primary">Criar conta e pagar R$ 10/mês</a>
      <p style="text-align: center; margin-top: 16px; font-size: 0.9rem;">
        <a href="04-establishment-login.html" style="color: var(--color-text-muted);">Já tenho conta</a>
      </p>
    </div>
  </div>
</body>
</html>
