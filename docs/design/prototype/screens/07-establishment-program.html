<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estabelecimento — Programa</title>
  <link rel="stylesheet" href="../css/prototype.css">
</head>
<body>
  <div class="phone-frame">
    <div class="phone-inner">
      <a href="06-establishment-dashboard.html" class="proto-back">← Voltar</a>
      <div class="proto-header">
        <h1>Programa de fidelidade</h1>
        <p>Defina quantos carimbos o cliente precisa para ganhar a recompensa.</p>
      </div>
      <label class="label" for="name">Nome do programa</label>
      <input type="text" id="name" class="input" value="Corte grátis" placeholder="Ex: Fidelidade">
      <label class="label" for="stamps">Carimbos necessários</label>
      <input type="number" id="stamps" class="input" value="10" placeholder="Ex: 10" min="1">
      <label class="label" for="reward">Descrição da recompensa</label>
      <input type="text" id="reward" class="input" value="1 corte grátis" placeholder="Ex: 1 café grátis">
      <a href="06-establishment-dashboard.html" class="btn btn-primary">Salvar</a>
    </div>
  </div>
</body>
</html>
